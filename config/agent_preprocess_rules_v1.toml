# 全量端上预处理规则包（与 edr-backend/platform/config/agent_preprocess_rules_v1.toml 由同一脚本生成）
# 更新：edr-backend/platform/config 下执行 python3 generate_agent_preprocess_rules.py 后覆盖本文件
# 说明：见 platform/config/README_dynamic_rules_v1.md（Agent 短 TOML 为保守可下沉子集，非 JSON 全量 R-* 一一对应）
#
[preprocessing]
dedup_window_s = 60
high_freq_threshold = 40
rules_version = "edr-dynamic-rules-v1-r218-9ae52519"

# Generated by generate_agent_preprocess_rules.py (conservative profile).
# High-noise single-indicator rules are intentionally downgraded to normal flow.
# Uncomment and tune the drop templates only after tenant-level validation.

# [[preprocessing.rules]]
# name = "noise-drop-ops-temp-1"
# action = "drop"
# event_type = "PROCESS_CREATE"
# exe_path_contains = "\\Windows\\Temp\\"
# icase_exe_path = true

[[preprocessing.rules]]
name = "r-exec-001_1"
action = "emit_always"
event_type = "PROCESS_CREATE"
cmdline_contains = "EncodedCommand"
icase_cmdline = true

[[preprocessing.rules]]
name = "r-exec-001_2"
action = "emit_always"
event_type = "PROCESS_CREATE"
cmdline_contains = "frombase64string"
icase_cmdline = true

[[preprocessing.rules]]
name = "r-cred-001_1"
