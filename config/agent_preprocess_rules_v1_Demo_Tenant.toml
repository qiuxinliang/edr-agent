[preprocessing]
dedup_window_s = 60
high_freq_threshold = 40
rules_version = "edr-dynamic-rules-v1-r218-9ae52519"

# Generated by generate_agent_preprocess_rules.py (conservative profile).
# High-noise single-indicator rules are intentionally downgraded to normal flow.
# Uncomment and tune the drop templates only after tenant-level validation.

# [[preprocessing.rules]]
# name = "noise-drop-ops-temp-1"
# action = "drop"
# event_type = "PROCESS_CREATE"
# exe_path_contains = "\\Windows\\Temp\\"
# icase_exe_path = true

[[preprocessing.rules]]
name = "noise-drop-reg-set-value"
action = "drop"
event_type = "REG_SET_VALUE"

[[preprocessing.rules]]
name = "noise-drop-reg-create-key"
action = "drop"
event_type = "REG_CREATE_KEY"

[[preprocessing.rules]]
name = "noise-drop-reg-delete-key"
action = "drop"
event_type = "REG_DELETE_KEY"

# Registry events dropped above (tunable via AGENT_PREPROCESS_DROP_REGISTRY in this script).
# P0 IR rules with event_type=registry_set will not see these events on the agent.

[[preprocessing.rules]]
name = "r-exec-001_1"
action = "emit_always"
event_type = "PROCESS_CREATE"
cmdline_contains = "EncodedCommand"
icase_cmdline = true

[[preprocessing.rules]]
name = "r-exec-001_2"
action = "emit_always"
event_type = "PROCESS_CREATE"
cmdline_contains = "frombase64string"
icase_cmdline = true

