# 本文件位于「仅含 edr-agent」的仓库根目录下的 .github/workflows/。
# 按标签构建并发布到 GitHub Release。
#
# 触发（push tag）：
#   - 标签形如 win_主版本.次版本.修订号（例 win_1.0.1）→ 仅构建并发布 **Windows** 产物。
#   - 标签形如 linux_主版本.次版本.修订号（例 linux_1.0.1）→ 仅构建并发布 **Linux** 产物。
#   说明：glob 用 win_*.*.* / linux_*.*.* 过滤；job 的 if 仅用 startsWith（兼容无 matches() 的旧 GHE）；semver 精确校验在构建 job 首步 bash。
#   workflow_dispatch → 仅构建并保留 Artifact（不创建 GitHub Release，便于验证 Actions）。
# Windows Artifact：zip（便携）+ EDRAgentSetup-<tag>.exe（Inno 图形安装）；Linux：zip 内含 install.sh。
# Windows 发布构建默认 **EDR_WITH_GRPC=OFF**（不经 vcpkg 编 gRPC，缩短 CI）；需 gRPC 客户端时请本机 vcpkg/MSVC 链或单独 job。
# 说明：只 push 分支、不打符合规则的 tag 时，本 workflow 不会出现任何 run，属正常现象。
# 若 Actions 页提示「This workflow graph cannot be shown」：多为尚未有 run，或旧 UI 对「全条件 job」不画静态图；下方 workflow-context 无 if，便于生成图；跑一次后即正常。
#
# 使用示例：
#   git tag win_1.0.1 && git push origin win_1.0.1
#   git tag linux_1.0.1 && git push origin linux_1.0.1

name: edr-agent client release

on:
  push:
    tags:
      # 至少含两段点分，与「主.次.修订」命名一致；精确校验在构建 job 的 bash 步骤
      - 'win_*.*.*'
      - 'linux_*.*.*'
  workflow_dispatch:
    inputs:
      target:
        description: '手动试跑：选平台（仅产物 Artifact，不发 Release）'
        required: true
        default: linux
        type: choice
        options:
          - linux
          - windows

permissions:
  contents: write

concurrency:
  group: edr-agent-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 无 if：任意触发下都执行，便于 GitHub 绘制 workflow 图；与构建 job 无依赖关系。
  workflow-context:
    name: Workflow context
    runs-on: ubuntu-latest
    steps:
      - name: Print trigger context
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "ref_name=${{ github.ref_name }}"
          echo "ref=${{ github.ref }}"

  # ---------- Windows ----------
  windows-build:
    name: Build Windows (edr_agent.exe)
    # push tag：on.push.tags 已限制 win_*.*.*；startsWith 兼容无 matches() 的 Actions/GHE 版本
    if: ${{ (github.event_name == 'push' && startsWith(github.ref_name, 'win_')) || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'windows') }}
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Validate release tag (semver)
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          ref="${GITHUB_REF_NAME}"
          if [[ ! "${ref}" =~ ^win_[0-9]+\.[0-9]+\.[0-9]+([+-].*)?$ ]]; then
            echo "::error::Invalid tag '${ref}'. Expected win_M.m.p with optional suffix (e.g. win_1.0.1, win_1.0.0-rc1)"
            exit 1
          fi

      - name: ONNX Runtime (CPU, Windows x64)
        shell: pwsh
        run: |
          $dest = Join-Path $env:GITHUB_WORKSPACE "onnxrt-win"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          $zip = Join-Path $dest "ort.zip"
          Invoke-WebRequest -Uri "https://github.com/microsoft/onnxruntime/releases/download/v1.17.3/onnxruntime-win-x64-1.17.3.zip" -OutFile $zip
          Expand-Archive -LiteralPath $zip -DestinationPath $dest -Force
          $root = Join-Path $dest "onnxruntime-win-x64-1.17.3"
          if (-not (Test-Path -LiteralPath $root)) { throw "ORT extract layout unexpected: missing $root" }
          "ONNXRUNTIME_ROOT=$root" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Configure (Release, ONNX Runtime, no gRPC)
        # 不经 vcpkg：显著缩短 Release/安装包 CI；Agent 使用 gRPC stub，HTTP ingest 等仍可按 agent.toml 工作。
        run: |
          cmake -B build `
            -DEDR_WITH_GRPC=OFF `
            -DEDR_WITH_ONNXRUNTIME=ON `
            "-DONNXRUNTIME_ROOT=$env:ONNXRUNTIME_ROOT" `
            -DCMAKE_BUILD_TYPE=Release `
            -DEDR_BUILD_TESTS=OFF

      - name: Build
        run: cmake --build build --config Release --parallel 4

      - name: Stage ORT DLLs next to edr_agent.exe
        run: ./scripts/stage_ort_dlls_build_release.ps1

      - name: Test
        shell: bash
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Bundle ONNX (onnx-output → models)
        shell: pwsh
        env:
          EDR_BUNDLE_ONNX_REQUIRED: "1"
        run: ./scripts/sync_onnx_output_to_models.ps1

      - name: Package zip (portable)
        shell: pwsh
        run: |
          $zip = "edr-agent-${{ github.ref_name }}-windows-amd64.zip"
          if (-not (Test-Path -LiteralPath "agent.toml.example")) { throw "missing agent.toml.example for portable zip" }
          if (-not (Test-Path -LiteralPath "models")) { throw "missing models/ for portable zip" }
          $items = @("build/Release/edr_agent.exe", "agent.toml.example", "models")
          if (Test-Path -LiteralPath "build/Release/onnxruntime.dll") { $items += "build/Release/onnxruntime.dll" }
          if (Test-Path -LiteralPath "build/Release/onnxruntime_providers_shared.dll") { $items += "build/Release/onnxruntime_providers_shared.dll" }
          Compress-Archive -Path $items -DestinationPath $zip -Force

      - name: Install Inno Setup 6
        run: choco install innosetup -y

      - name: Build Windows installer (EDRAgentSetup.exe)
        shell: pwsh
        run: |
          $ref = '${{ github.ref_name }}'
          if ($ref -match '^win_(.+)$') { $v = $Matches[1] } else { $v = '0.0.${{ github.run_number }}' }
          $iss = Join-Path $PWD "install\windows-inno\EDRAgentSetup.iss"
          $agent = Join-Path $PWD "build\Release\edr_agent.exe"
          if (-not (Test-Path $agent)) { throw "missing $agent" }
          $iscc = Join-Path ${env:ProgramFiles(x86)} "Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { $iscc = Join-Path $env:ProgramFiles "Inno Setup 6\ISCC.exe" }
          if (-not (Test-Path $iscc)) { throw "ISCC.exe not found" }
          & $iscc "/DEDR_AGENT_EXE=$agent" "/DMyAppVersion=$v" $iss
          $out = Join-Path $PWD "install\windows-inno\Output\EDRAgentSetup.exe"
          if (-not (Test-Path $out)) { throw "installer output missing: $out" }
          Copy-Item $out -Destination (Join-Path $PWD "EDRAgentSetup-$ref.exe") -Force

      - uses: actions/upload-artifact@v7
        with:
          name: edr-agent-windows-${{ github.ref_name }}
          path: |
            edr-agent-${{ github.ref_name }}-windows-amd64.zip
            EDRAgentSetup-${{ github.ref_name }}.exe
          retention-days: 14
          if-no-files-found: error

  windows-release:
    name: Publish Windows Release
    if: ${{ github.event_name == 'push' && startsWith(github.ref_name, 'win_') }}
    needs: windows-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v7
        with:
          name: edr-agent-windows-${{ github.ref_name }}
          path: dist

      - name: Verify artifact
        run: ls -la dist/

      - uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: edr-agent ${{ github.ref_name }} (Windows amd64)
          generate_release_notes: true
          files: |
            dist/*.zip
            dist/*.exe
          fail_on_unmatched_files: true

  # ---------- Linux ----------
  linux-build:
    name: Build Linux (edr_agent)
    if: ${{ (github.event_name == 'push' && startsWith(github.ref_name, 'linux_')) || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'linux') }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Validate release tag (semver)
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          ref="${GITHUB_REF_NAME}"
          if [[ ! "${ref}" =~ ^linux_[0-9]+\.[0-9]+\.[0-9]+([+-].*)?$ ]]; then
            echo "::error::Invalid tag '${ref}'. Expected linux_M.m.p with optional suffix (e.g. linux_1.0.1)"
            exit 1
          fi

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev libyara-dev zip

      - name: Configure (Release, no gRPC)
        run: cmake -B build -DEDR_WITH_GRPC=OFF -DCMAKE_BUILD_TYPE=Release -DEDR_WITH_YARA=ON -DEDR_BUILD_TESTS=OFF

      - name: Build
        run: cmake --build build -j "$(nproc)"

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Bundle ONNX (onnx-output → models)
        env:
          EDR_BUNDLE_ONNX_REQUIRED: "1"
        run: ./scripts/sync_onnx_output_to_models.sh

      - name: Package zip (binary + install.sh 一键安装)
        run: |
          strip build/edr_agent 2>/dev/null || true
          DIST="edr-agent-${{ github.ref_name }}-linux-amd64"
          rm -rf "$DIST"
          mkdir -p "$DIST"
          cp build/edr_agent "$DIST/"
          cp agent.toml.example "$DIST/"
          cp -a models "$DIST/"
          cp install/linux/install.sh "$DIST/"
          chmod +x "$DIST/edr_agent" "$DIST/install.sh"
          {
            echo "解压后在本目录执行（需 root）："
            echo "  sudo ./install.sh"
            echo ""
            echo "安装完成后用平台 Token 注册并写全 agent.toml，见 docs/AGENT_INSTALLER.md"
          } >"$DIST/README-INSTALL.txt"
          zip -9 -r "edr-agent-${{ github.ref_name }}-linux-amd64.zip" "$DIST"

      - uses: actions/upload-artifact@v7
        with:
          name: edr-agent-linux-${{ github.ref_name }}
          path: edr-agent-${{ github.ref_name }}-linux-amd64.zip
          retention-days: 14
          if-no-files-found: error

  linux-release:
    name: Publish Linux Release
    if: ${{ github.event_name == 'push' && startsWith(github.ref_name, 'linux_') }}
    needs: linux-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v7
        with:
          name: edr-agent-linux-${{ github.ref_name }}
          path: dist

      - name: Verify artifact
        run: ls -la dist/

      - uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: edr-agent ${{ github.ref_name }} (Linux amd64)
          generate_release_notes: true
          files: dist/*.zip
          fail_on_unmatched_files: true
