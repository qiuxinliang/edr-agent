# 无 gRPC 快编。全链 **gRPC+ONNX+ctest** 见同目录 `edr-agent-build-grpc-ort.yml`（对 push/PR/手动 均可触发）。monorepo 用根目录的 workflows。

name: edr-agent build

on: [push, pull_request, workflow_dispatch]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure (no gRPC)
        run: cmake -B build -DEDR_WITH_GRPC=OFF
      - name: Build Release
        run: cmake --build build --config Release --parallel 4
      - name: Test
        shell: bash
        run: ctest --test-dir build -C Release --output-on-failure
