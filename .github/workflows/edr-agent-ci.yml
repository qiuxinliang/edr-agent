# 无 gRPC 快编（Ninja + sccache/ccache）。全链 gRPC+ONNX 见 `edr-agent-build-grpc-ort.yml`。monorepo 用根目录 workflows。

name: edr-agent build

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  SCCACHE_GHA_ENABLED: "true"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ilammy/msvc-dev-cmd@v1.13.0
        with:
          arch: x64
      - name: Install Ninja
        shell: pwsh
        run: choco install ninja -y --no-progress
      - uses: mozilla-actions/sccache-action@v0.0.10
      - name: Configure (no gRPC, Ninja, sccache)
        shell: pwsh
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release `
            -DEDR_WITH_GRPC=OFF `
            -DEDR_WITH_ONNXRUNTIME=OFF `
            -DEDR_WITH_YARA=OFF `
            -DEDR_BUILD_TESTS=OFF `
            -DCMAKE_C_COMPILER_LAUNCHER=sccache `
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
      - name: Build
        shell: pwsh
        run: cmake --build build --parallel $env:NUMBER_OF_PROCESSORS
      - name: Test
        shell: bash
        run: ctest --test-dir build --output-on-failure

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build ccache
      - name: Configure
        env:
          CC: ccache gcc
          CXX: ccache g++
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DEDR_WITH_GRPC=OFF \
            -DEDR_WITH_ONNXRUNTIME=OFF \
            -DEDR_WITH_YARA=OFF \
            -DEDR_BUILD_TESTS=OFF
      - name: Build
        run: cmake --build build --parallel $(nproc)
      - name: ccache stats
        run: ccache -s
      - name: Test
        run: ctest --test-dir build --output-on-failure
