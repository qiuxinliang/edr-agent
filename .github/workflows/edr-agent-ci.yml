# 独立 edr-agent 仓库：GHA 工作目录 = 本仓库根（与 vcpkg.json、CMakeLists.txt 同级）。
# 若你用的是 **monorepo**（edr-agent 是子目录），应使用**上层仓库**里的
# `.github/workflows/edr-agent-ci.yml`（其中带 `working-directory: edr-agent`），勿用本文件。

name: edr-agent build

on: [push, pull_request, workflow_dispatch]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure (no gRPC)
        run: cmake -B build -DEDR_WITH_GRPC=OFF
      - name: Build Release
        run: cmake --build build --config Release --parallel 4
      - name: Test
        shell: bash
        run: ctest --test-dir build -C Release --output-on-failure
